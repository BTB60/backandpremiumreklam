# Premium Reklam — Nginx (Ubuntu VPS)
# Fayl: /etc/nginx/sites-available/premiumreklam.shop
# sudo ln -sf /etc/nginx/sites-available/premiumreklam.shop /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d premiumreklam.shop -d www.premiumreklam.shop

upstream premiumreklam_next {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream premiumreklam_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP — Let's Encrypt və redirect (certbot bu bloku genişlədə bilər)
server {
    listen 80;
    listen [::]:80;
    server_name premiumreklam.shop www.premiumreklam.shop;

    client_max_body_size 15m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /api/ {
        proxy_pass http://premiumreklam_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://premiumreklam_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

