services:
  - type: web
    name: decorapp-api
    runtime: docker
    repo: https://github.com/yourusername/decorapp-backend
    branch: main
    plan: standard
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DB_HOST
        fromDatabase:
          name: decorapp-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: decorapp-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: decorapp-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: decorapp-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: decorapp-db
          property: password
      - key: REDIS_URL
        fromService:
          type: redis
          name: decorapp-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: MINIO_ENDPOINT
        value: https://files.decorapp.az
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
    healthCheckPath: /actuator/health
    autoDeploy: true

  - type: redis
    name: decorapp-redis
    plan: free
    ipAllowList: []

databases:
  - name: decorapp-db
    plan: standard
    databaseName: decorapp
    user: decorapp
    postgresMajorVersion: 16
